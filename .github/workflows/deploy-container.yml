name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          missing=""
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then missing="$missing AZURE_CREDENTIALS"; fi
          if [ -z "${{ secrets.AZURE_CONTAINER_REGISTRY }}" ]; then missing="$missing AZURE_CONTAINER_REGISTRY"; fi
          if [ -z "${{ secrets.AZURE_CONTAINER_APP_NAME }}" ]; then missing="$missing AZURE_CONTAINER_APP_NAME"; fi
          if [ -z "${{ secrets.AZURE_RESOURCE_GROUP }}" ]; then missing="$missing AZURE_RESOURCE_GROUP"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secrets:$missing"
            echo "Please configure these secrets in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login via Azure CLI
        uses: azure/login@v2.1.1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image via ACR Tasks
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_CONTAINER_REGISTRY }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform linux/amd64 \
            --file src/Dockerfile \
            src/

      - name: Deploy new container image with environment variables
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_CONTAINER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars \
              FOUNDRY_ENDPOINT="${{ secrets.FOUNDRY_ENDPOINT }}" \
              gpt_endpoint="${{ secrets.GPT_ENDPOINT }}" \
              embedding_endpoint="${{ secrets.EMBEDDING_ENDPOINT }}" \
              phi_4_endpoint="${{ secrets.PHI_4_ENDPOINT }}"
